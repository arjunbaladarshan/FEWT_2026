<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      a = {
        firstname: "arjun",
        lastname: "bala",
        spi: [1, 2, 4, 6],
        printMe: function () {
          document.write("Firstname is " + this.firstname);
          document.write("Lastname is " + this.lastname);
          document.write("SPI is " + this.spi);
        },
      };
      a.printMe();
    </script>
  </body>
</html>
