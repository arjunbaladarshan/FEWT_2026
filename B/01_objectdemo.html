      function abc(n1, n2) {
        add = n1 + n2;
        sub = n1 - n2;
        mul = n1 * n2;
        div = n1 / n2;
        sq = n1 * n1;
        mix = { add, sub, mul, div, something: sq };
        return mix;
      }
